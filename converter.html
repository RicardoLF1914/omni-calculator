<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni Calculator</title>
    <link rel="icon" type="image/png" href="./assets/icon.png">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <img src="./assets/dark-space.jpg" class="full-screen-img">
    
    <header>
        <h1>Omni Calculator</h1>
        
        <div class="navigation">
            <nav>
                <a href="./index.html" class="nav-btn nav-left">Calculadora</a>
                <a href="./converter.html" class="nav-btn nav-right active">Conversor de Unidades</a>
            </nav>
        </div>
    </header>

    <main class="converter-main">
        <div class="categorias">
            <select id="categoria" onchange="atualizarUnidades()">
                <option value="comprimento">📏 Comprimento</option>
                <option value="massa">⚖️ Massa</option>
                <option value="temperatura">🌡️ Temperatura</option>
                <option value="area">⬛ Área</option>
                <option value="volume">🧊 Volume</option>
                <option value="velocidade">💨 Velocidade</option>
                <option value="tempo">⏱️ Tempo</option>
            </select>
        </div>
 
        <div class="converter-inputs">
            <div class="converter-field">
                <label for="valor">Valor</label>
                <input type="number" id="valor" placeholder="0">
            </div>
 
            <div class="converter-selects">
                <div class="select-group">
                    <label for="de">De</label>
                    <select id="de"></select>
                </div>
 
                <button class="swap-btn" onclick="swap()" title="Trocar unidades">⇄</button>
 
                <div class="select-group">
                    <label for="para">Para</label>
                    <select id="para"></select>
                </div>
            </div>
        </div>
 
        <input type="button" id="converter" value="Converter" onclick="converter()">
 
        <div class="resultado">
            <span>-</span>
        </div>
    </main>

    <footer>
        <p>&copy; Ricardo Linhares</p>

        <div class="footer-links">
            <a href="https://github.com/RicardoLF1914">
                <img src="./assets/github.svg" alt="github logo">
            </a>
                
            <a href="http://www.linkedin.com/in/ricardo-linhares-0a914a287">
                <img src="./assets/linkedin.svg" alt="linkedin logo">
            </a>
        </div>
    </footer>

    <script src="./scripts/converter.js"></script>
</body>
</html>
