<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni Calculator</title>
    <link rel="icon" type="image/png" href="./assets/icon.png">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <img src="./assets/dark-space.jpg" class="full-screen-img">
    
    <header>
        <h1>Omni Calculator</h1>
        
        <div class="navigation">
            <nav>
                <a href="./index.html" class="nav-btn nav-left active">Calculadora</a>
                <a href="./converter.html" class="nav-btn nav-right">Conversor de Unidades</a>
            </nav>
        </div>
    </header>

    <main>
        <input
            type="tel"
            id="teclado-mobile"
            autocomplete="off"
            style="position:absolute; opacity:0; width:1px; height:1px; pointer-events:none;"
        />

        <div class="resultado">
            <p id="display">0</p>
        </div>

        <div class="operacoes">
            <button class="btn operacao" data-operacao="adicao">+</button>
            <button class="btn operacao" data-operacao="subtracao">−</button>
            <button class="btn operacao" data-operacao="multiplicacao">x</button>
            <button class="btn operacao" data-operacao="divisao">÷</button>
            <button class="btn operacao" data-operacao="potenciacao">^</button>
            <button class="btn operacao" data-operacao="radiciacao">√</button>
        </div>

        <div class="operacoes-cientificas">
            <button class="btn operacao-cientifica" data-operacao="seno">sin</button>
            <button class="btn operacao-cientifica" data-operacao="cosseno">cos</button>
            <button class="btn operacao-cientifica" data-operacao="tangente">tan</button>
            <button class="btn operacao-cientifica" data-operacao="logaritmo">log</button>
            <button class="btn operacao-cientifica" data-operacao="logN">ln</button>
            <button class="btn operacao-cientifica" data-operacao="absoluto">|x|</button>
        </div>

        <div class="operacoes-finais">
            <button class="btn" id="calcular">=</button>
            <button class="btn" id="limpar">C</button>
        </div>

        <p class="instrucoes">Digite os números usando o teclado</p>
    </main>

    <footer>
        <p>&copy; Ricardo Linhares</p>

        <button id="btn-historico">Histórico</button>

        <div class="footer-links">
            <a href="https://github.com/RicardoLF1914">
                <img src="./assets/github.svg" alt="github logo">
            </a>
                
            <a href="http://www.linkedin.com/in/ricardo-linhares-0a914a287">
                <img src="./assets/linkedin.svg" alt="linkedin logo">
            </a>
        </div>
    </footer>

    <div id="modal-historico" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h2>Histórico</h2>
                <button id="fechar-modal">✕</button>
            </div>
            <ul id="lista-historico">
                <li class="historico-vazio">Nenhuma operação realizada ainda.</li>
            </ul>
            <button id="limpar-historico">Limpar histórico</button>
        </div>
    </div>

    <script src="./scripts/calculator.js"></script>
</body>
</html>
