<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img src="./assets/dark-space.jpg" class="full-screen-img">
    
    <header>
        <h1>Omni Calculator</h1>
        
        <div class="navigation">
            <nav>
                <a href="#">Calculadora</a>
                <span> | </span>
                <a href="#">Calculadora Científica</a>
                <span> | </span>
                <a href="#">Conversor de Unidades</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="numeros">
            <p>
                Valor 1:
                <input type="number" id="n1">
            </p>

            <p>
                Valor 2:
                <input type="number" id="n2">
            </p>
        </div>

        <div class="operacoes">
            <label><input type="radio" value="adicao"> +</label>
            <label><input type="radio" value="subtracao"> -</label>
            <label><input type="radio" value="multiplicacao"> x</label>
            <label><input type="radio" value="divisao"> ÷</label>
            <label><input type="radio" value="potenciacao"> ^</label>
            <label><input type="radio" value="radiciacao"> √</label>
        </div>

        <input type="button" id="calcular" value="Calcular">

    </main>
</body>
</html>
