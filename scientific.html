<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img src="./assets/dark-space.jpg" class="full-screen-img">
    
    <header>
        <h1>Omni Calculator</h1>
        
        <div class="navigation">
            <nav>
                <a href="index.html">Calculadora</a>
                <span> | </span>
                <a href="scientific.html">Calculadora Científica</a>
                <span> | </span>
                <a href="#">Conversor de Unidades</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="numeros">
            <p>
                Valor:
                <input type="number" id="n">
            </p>
        </div>

        <div class="operacoes">
            <label><input type="radio" value="seno"> sin</label>
            <label><input type="radio" value="cosseno"> cos</label>
            <label><input type="radio" value="tangente"> tan</label>
            <label><input type="radio" value="logaritmo"> log</label>
            <label><input type="radio" value="absoluto"> abs</label>
            <label><input type="radio" value="logN"> ln</label>
        </div>

        <input type="button" id="calcular" value="Calcular">

        <div class="resultado">
            <p>Resultado: 
                <span>-</span>
            </p>
        </div>
    </main>

    <footer>
        <p>&copy; Ricardo Linhares</p>

        <div class="footer-links">
            <a href="https://github.com/RicardoLF1914">
                <img src="./assets/github.svg" alt="github logo">
            </a>
                
            <a href="http://www.linkedin.com/in/ricardo-linhares-0a914a287">
                <img src="./assets/linkedin.svg" alt="linkedin logo">
            </a>
        </div>
    </footer>
</body>
</html>
